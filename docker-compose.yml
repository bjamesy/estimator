services:
  # Local message broker -- deliberately NOT the CloudAMQP instance in
  # web/.env and workers/.env's MESSAGE_BROKER_URL. Confirmed with the
  # user (2026-07-02): docker-compose is meant to be a fully local,
  # zero-cloud-quota dev stack, so every docker-compose session gets its
  # own throwaway broker rather than spending CloudAMQP message quota on
  # local/test traffic -- the same quota-consciousness that motivated
  # disabling AMQP heartbeats (see docs/architecture.md -> "Heartbeats
  # are disabled"). This means docker-compose and the native run path
  # (README.md -> "Option B") talk to different brokers by design; that's
  # fine since RabbitMQ's wire behavior doesn't vary between a local
  # container and CloudAMQP's managed one. Supabase (Postgres/Auth/
  # Storage) stays a hosted cloud project either way -- this project has
  # never run local Postgres -- so RabbitMQ is the one infra piece worth
  # self-hosting here.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672" # AMQP, consumed by web/ and workers/
      - "15672:15672" # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    environment:
      # Overrides whatever broker (e.g. CloudAMQP) web/.env has configured
      # -- Supabase/Anthropic settings still come from the env file
      # untouched. See docs/architecture.md -> "How Next.js actually
      # publishes to RabbitMQ".
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

  workers:
    build: ./workers
    env_file:
      - ./workers/.env
    environment:
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./workers:/app
